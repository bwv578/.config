#shell
shell /usr/bin/env nu

#font
font_family JetBrainsMono Nerd Font Mono
font_size 16.0

#color
#foreground #000000
#background #D3D3D3
foreground #EEEEEE
background #000000
background_opacity 0.55

#text cursor
cursor #8B008B

#tab bar
tab_bar_background #000000

#mouse — Super+click behaves like plain left click (WM이 Super를 가로채지 않는 환경에서 Super 누르고 클릭해도 동작하도록)
mouse_map super+left press ungrabbed mouse_selection normal
mouse_map super+left doublepress ungrabbed mouse_selection word
mouse_map super+left triplepress ungrabbed mouse_selection line
mouse_map super+left click ungrabbed mouse_handle_click selection link prompt

