# 0. Terminate process
leftctrl+q : EXIT

# 1. Trigger virtual mouse mode
leftmeta : LINEAR_MODE
leftmeta+leftshift : LOGARITHMIC_MODE
leftmeta+c : SCROLL_MODE

# 2. Move cursor or scroll

# 2-1. Intuitive
i : MOVE_UP
k : MOVE_DOWN
j : MOVE_LEFT
l : MOVE_RIGHT

# 2-2. Vim
# k : MOVE_UP
# j : MOVE_DOWN
# h : MOVE_LEFT
# l : MOVE_RIGHT

# 3. Mouse click
space : CLICK_LEFT
semicolon : CLICK_RIGHT
